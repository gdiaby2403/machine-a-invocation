<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>La Machine à invocation</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <h1> La Machine à Invocation</h1>
    <section>
    <form action="" id="invocation">
        <label for="prenom">Prenom :</label>
            <input  type="text" id="prenom">
        <label for="creature"></label>
            <select name="choix_creature" id="creature">
                <option value="chat_octo">Chat-Octo</option>
                <option value="dragon_debug">Dragon-Debug</option>
                <option value="licorne_css">Licorne-CSS</option>
                <option value="renard_refacto">Renard-Refacto</option>
            </select>
    </form>
    </section>
    <button type="submit" id="btn-invoquer">Invoquer !</button>
    <section id="resultat">
        <p id="message" class="cache"></p>
    </section>
<script src="script.js"defer></script>  
</body>
</html>
